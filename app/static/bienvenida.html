<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida | MSTCH Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* VIDEO BACKGROUND */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: 0;
            object-fit: cover;
        }

        /* OVERLAY GRADIENT */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* WELCOME CARD CONTAINER */
        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical */
            align-items: center;
            text-align: center;
            padding: 0 200px; /* Espacio para no chocar con los pulsos laterales */
        }

        /* ANIMATED TEXT */
        .welcome-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 80px; /* Bajarlo un poco para que quede debajo del logo de arriba */
        }

        .welcome-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tag {
            color: #ffffff;
            font-size: 1.2vw;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 400;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .guest-name {
            font-size: 5vw; /* Un poco más pequeño para que quepa bien entre señales */
            font-weight: 700;
            line-height: 1.1;
            color: #ffffff;
            text-transform: uppercase;
            /* Sombrío suave para legibilidad sobre el fondo */
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(216, 88, 163, 0.3);
            max-width: 600px; /* Forzar que el nombre se acomode hacia abajo si es largo */
            word-wrap: break-word;
        }

        .mstch-logo {
            position: absolute;
            top: 50px;
            height: 80px;
            opacity: 0.8;
        }

        /* LOGO MSTCH IN CORNER */
        .corner-logo {
            position: absolute;
            bottom: 40px;
            height: 40px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <video id="bg-video" class="video-background" autoplay muted loop playsinline>
        <source src="https://storage.googleapis.com/shaq-invitaciones-bucket/videos_fondo/REGISTRO_1400x800.mp4"
            type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <div class="welcome-card" id="welcome-card">
            <span class="tag" id="welcome-tag">¡BIENVENIDO!</span>
            <h1 class="guest-name" id="display-name">USUARIO</h1>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC-1fl9GwYuNCs73BIL45iIZTu5V5k5Y6E",
            authDomain: "shaq-brand-bot.firebaseapp.com",
            projectId: "shaq-brand-bot",
            storageBucket: "shaq-brand-bot.firebasestorage.app",
            messagingSenderId: "612926027116",
            appId: "1:612926027116:web:1cee7d950033c3f7faaf49"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const card = document.getElementById('welcome-card');
        const nameEl = document.getElementById('display-name');

        let lastWelcomeTimes = new Map();
        let isFirstLoad = true;
        let queue = [];
        let isShowing = false;

        // Listener en tiempo real
        db.collection("guests").onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;
                
                // Convertir Timestamp de Firebase a milisegundos para comparar
                let currentTs = 0;
                if (data.last_welcome_timestamp) {
                    currentTs = data.last_welcome_timestamp.toDate ? 
                                data.last_welcome_timestamp.toDate().getTime() : 
                                new Date(data.last_welcome_timestamp).getTime();
                }

                if (isFirstLoad) {
                    // En la carga inicial solo guardamos el estado actual sin disparar nada
                    if (currentTs) lastWelcomeTimes.set(id, currentTs);
                } else {
                    // Si el timestamp cambió (y existe), disparamos la bienvenida en pantalla
                    if (currentTs && currentTs !== lastWelcomeTimes.get(id)) {
                        lastWelcomeTimes.set(id, currentTs);
                        queue.push(data.name);
                        processQueue();
                    }
                }
            });
            isFirstLoad = false;
        });

        function processQueue() {
            if (isShowing || queue.length === 0) return;

            isShowing = true;
            const name = queue.shift();

            // Actualizar nombre
            nameEl.innerText = name.toUpperCase();

            // Mostrar animación
            card.classList.add('visible');

            // Tiempo en pantalla (6 segundos)
            setTimeout(() => {
                card.classList.remove('visible');

                // Esperar a que termine de desvanecerse para mostrar el siguiente
                setTimeout(() => {
                    isShowing = false;
                    processQueue();
                }, 1000);

            }, 6000);
        }
    </script>
</body>

</html>
