<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Usuarios Antena | MSTCH Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        /* Estilos heredados del diseño premium de Invitados */
        * { box-sizing:border-box; margin:0; padding:0; }
        :root { --primary:#d858a3; --grad:linear-gradient(135deg,#d858a3 0%,#a02c6b 100%); --glow:rgba(216,88,163,0.35); --card:rgba(25,25,31,0.5); --border:rgba(255,255,255,0.1); }
        html,body { width:100%; background:#000; color:#e5e2e1; font-family:'Inter',sans-serif; overflow-x:hidden; }
        .page { display:flex; flex-direction:column; width:100%; min-height:100vh; padding-bottom:90px; }
        .logo-bar { width:100%; display:flex; justify-content:center; padding:24px 16px 12px; }
        .logo-bar img { height:64px; object-fit:contain; }
        .page-header { padding:0 16px 16px; }
        .system-tag { display:block; color:var(--primary); font-size:10px; letter-spacing:3px; text-transform:uppercase; font-weight:700; margin-bottom:6px; }
        .page-header h1 { font-size:30px; font-weight:700; color:white; margin-bottom:4px; }
        .page-header p { color:#555; font-size:13px; }
        .content { padding:0 12px; display:flex; flex-direction:column; gap:12px; }
        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; }
        .search-box input { background:none; border:none; outline:none; color:white; font-family:'Inter',sans-serif; font-size:14px; width:100%; }
        .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
        .table-scroll { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; min-width:400px; }
        thead th { padding:12px 14px; text-align:left; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#555; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); }
        tbody td { padding:13px 14px; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.03); }
        .td-epcid { color:var(--primary); font-weight:700; font-family:monospace; }
        .td-name { font-weight:600; cursor:text; outline:none; transition:all 0.2s; border-radius:4px; padding:4px 8px; border:1px solid transparent; }
        .td-name:hover { background:rgba(255,255,255,0.05); }
        .td-name:focus { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.3); }

        /* MODAL */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(14px); display:none; justify-content:center; align-items:center; z-index:2000; padding:20px; }
        .modal-overlay.visible { display:flex; }
        .modal-card { background:rgba(18,18,24,0.98); border:1px solid rgba(216,88,163,0.2); border-radius:24px; width:100%; max-width:400px; padding:36px 28px; text-align:center; }
        .modal-btn-confirm { background:var(--grad); border:none; color:white; border-radius:8px; padding:11px 24px; font-weight:700; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; box-shadow:0 4px 14px var(--glow); margin-top:20px; }

        /* NAV */
        .nav-bar { display:flex; justify-content:space-around; align-items:center; padding:10px 8px; background:rgba(5,5,5,0.97); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.06); position:fixed; bottom:0; left:0; width:100%; z-index:1000; }
        .nav-item { color:#555; text-decoration:none; font-size:8px; display:flex; flex-direction:column; align-items:center; gap:3px; text-transform:uppercase; letter-spacing:1px; flex:1; }
        .nav-item .material-icons-round { font-size:20px; }
        .nav-item.active { color:var(--primary); }
    </style>
</head>
<body>

<div class="modal-overlay" id="custom-modal">
    <div class="modal-card">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-text" id="modal-text" style="color:#78716c; font-size:13px; margin-top:10px;"></div>
        <button class="modal-btn-confirm" onclick="closeModal()">ACEPTAR</button>
    </div>
</div>

<div class="page">
    <div class="logo-bar"><img src="/static/img/logo.png" alt="MSTCH"></div>

    <div class="page-header">
        <span class="system-tag">Base de Datos Bristol</span>
        <h1>Usuarios Antena</h1>
        <p>Gestión de nombres y EPCIDs en bristol-db.</p>
    </div>

    <div class="content">
        <div class="search-box">
            <span class="material-icons-round">search</span>
            <input type="text" id="search-input" placeholder="Buscar por nombre o EPCID..." oninput="applyFilter()">
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table id="user-table">
                    <thead>
                        <tr>
                            <th>EPCID</th>
                            <th>Nombre</th>
                        </tr>
                    </thead>
                    <tbody id="user-tbody">
                        <tr><td colspan="2" style="text-align:center;padding:32px;color:#555">Cargando usuarios...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <a href="/" class="nav-item"><span class="material-icons-round">home</span>HOME</a>
    <a href="/invitados" class="nav-item"><span class="material-icons-round">people</span>INVITADOS</a>
    <a href="/users-antenna" class="nav-item active"><span class="material-icons-round">settings_input_antenna</span>USUARIOS ANTENA</a>
    <a href="/acceso-antena" class="nav-item"><span class="material-icons-round">history</span>LOGS</a>
    <a href="/dashboard" class="nav-item"><span class="material-icons-round">dashboard</span>DASHBOARD</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    let allUsers = [], filteredUsers = [];

    // Función para cargar los datos desde nuestro BACKEND
    async function loadData() {
        const tbody = document.getElementById('user-tbody');
        try {
            const res = await fetch('/api/antena/users');
            if (!res.ok) throw new Error('Error al obtener datos');
            
            const data = await res.json();
            
            // Ordenar: poner los "EXTRA" al principio
            data.sort((a, b) => {
                const nameA = (a.Nombre || '').toLowerCase();
                const nameB = (b.Nombre || '').toLowerCase();
                const isExtraA = nameA.includes('extra');
                const isExtraB = nameB.includes('extra');
                
                if (isExtraA && !isExtraB) return -1;
                if (!isExtraA && isExtraB) return 1;
                return nameA.localeCompare(nameB); // Alfabético para el resto
            });

            allUsers = data;
            applyFilter();
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;padding:32px;color:#ff6b60">Error al conectar con el servidor.</td></tr>';
        }
    }

    function applyFilter() {
        const q = document.getElementById('search-input').value.toLowerCase();
        filteredUsers = allUsers.filter(u => 
            (u.Nombre || '').toLowerCase().includes(q) || 
            (u.EPCID || '').toLowerCase().includes(q)
        );
        render();
    }

    function render() {
        const tbody = document.getElementById('user-tbody');
        if (allUsers.length === 0 && !filteredUsers.length) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;padding:32px;color:#555">No hay usuarios en la base de datos.</td></tr>';
            return;
        }
        if (filteredUsers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;padding:32px;color:#555">Sin resultados para la búsqueda.</td></tr>';
            return;
        }
        tbody.innerHTML = filteredUsers.map(u => `
            <tr>
                <td class="td-epcid">${u.EPCID || '-'}</td>
                <td class="td-name" contenteditable="true" spellcheck="false" 
                    onblur="saveUserName('${u.id_doc}', this.innerText, this)" 
                    onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }">
                    ${u.Nombre || ''}
                </td>
            </tr>
        `).join('');
    }

    async function saveUserName(docId, newName, el) {
        // Buscamos el usuario en nuestra lista local
        const user = allUsers.find(u => u.id_doc === docId);
        if(!user || newName.trim() === user.Nombre) return;
        
        try {
            el.style.opacity = '0.5';
            const res = await fetch(`/api/antena/users/${docId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre: newName.trim() })
            });
            if(!res.ok) throw new Error('Error al actualizar');
            
            // Actualizamos el nombre local para que no intente guardar lo mismo otra vez
            user.Nombre = newName.trim();
        } catch(e) {
            el.innerText = user.Nombre;
            showModal('Error', 'No se pudo actualizar el nombre.');
        } finally {
            el.style.opacity = '1';
        }
    }

    function showModal(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('custom-modal').classList.add('visible');
    }
    function closeModal() { document.getElementById('custom-modal').classList.remove('visible'); }

    // Carga inicial
    loadData();
</script>
</body>
</html>
